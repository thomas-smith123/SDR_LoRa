[ad9361]
uri=ip:192.168.2.1
rx_frequency_mhz=433.0
rx_bandwidth_mhz=1.0
# 按顺序尝试，成功一个就停止。AD9361 不同镜像/时钟下支持的采样率可能不同。
rx_sample_rate_candidates_msps=1.0,2.5,4.0,5.0,10.0
rx_buffer_samples=65536

[lora]
frequency_mhz=433.0
bandwidth_khz=125.0
spreading_factor=7
preamble_symbols=8
coding_rate=1
explicit_header=true
phy_crc=false
# 解调用零填充 FFT 倍数；8 通常是速度和频率分辨率的折中。
zero_padding_ratio=8
# ring buffer 上限按“最长 payload 帧数”估计，避免噪声或长包时无限增长。
max_payload_bytes=255
max_buffered_frames=16

[display]
# 时频图最大刷新率。越大越流畅，但 CPU/UI 压力也越大。
max_fps=20
# 每次送到频谱计算线程的最小 IQ 点数；程序会至少覆盖 1/max_fps 秒的数据，避免漏显示短时 LoRa 包。
snapshot_points=4096
# 每帧频谱 FFT 点数。越大越细，但瀑布图每帧重绘越重。
fft_points=512
# 瀑布图历史行数。
waterfall_rows=80
# 上方频谱图固定纵坐标范围，避免自动缩放导致视觉抖动。
spectrum_min_db=-120
spectrum_max_db=20

[save]
# 解码 payload 符合 ID:****,TEMP:****,MAG:****,Volt:**** 时，按 ID 分目录保存完整一帧 IQ 为 .npy。
enable_signal_npy=false
# 保存根目录；相对路径以程序启动目录为基准，也可以写绝对路径。
root_dir=detected_iq
# ID 子目录名前缀，例如 station_001；留空则直接使用 payload 中的 ID。
id_dir_prefix=
# .npy 文件名前缀；留空则文件名从时间戳开始。
file_name_prefix=
